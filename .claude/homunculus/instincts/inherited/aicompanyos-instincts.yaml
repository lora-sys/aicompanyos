# Aicompanyos Workflow Add Or Enhance Module With Tests And Docs

## Action

Follow the add-or-enhance-module-with-tests-and-docs workflow:
1. Create or update multiple source files in a module directory (e.g., src/team/, src/completion-guard/)
2. Add or update corresponding test files in __tests__/
3. Update or add documentation files (README.md, MODULE_GUIDE.md, AGENTS.md, UBIQUITOUS_LANGUAGE.md, lessons/, learning-records/)
4. Update package.json and build outputs (dist/)
5. Synchronize types and interfaces if needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: packages/loop-engine/src/team/*.ts, packages/loop-engine/src/completion-guard/*.ts, packages/loop-engine/src/team/__tests__/*.ts

